name: Machine Learning CI Workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  train-and-build-docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12.7"

    - name: Install Base Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "mlflow==2.19.0" dagshub scikit-learn pandas matplotlib

    - name: Run MLflow Project (Re-training Model)
      env:
        MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        cd MLProject
        mlflow run . --no-conda

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image using MLflow
      env:
        MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        RUN_ID=$(python -c "import mlflow; mlflow.set_tracking_uri('https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_Muhammad-Anhar-Tamim.mlflow'); runs = mlflow.search_runs(experiment_names=['MSML_Breast_Cancer_Tuning']); print(runs.iloc[0].run_id)")
        echo "Building Docker Image for RUN_ID: $RUN_ID"
        mlflow models build-docker \
          -m "runs:/$RUN_ID/model" \
          -n "${{ secrets.DOCKERHUB_USERNAME }}/breast-cancer-model:latest" \
          --enable-mlserver

    - name: Push Docker Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/breast-cancer-model:latest
